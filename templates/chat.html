<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gemini Chat</title>
  <link rel="stylesheet" href="/static/chat.css">
</head>
<body>

  <!-- Camera layer -->
  <div id="camera-layer">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="capture-canvas"></canvas>
  </div>

  <!-- Status overlay -->
  <div id="overlay">
    <!-- Top status -->
    <div class="overlay-top">
      <div class="status-pill" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-text">Offline</span>
      </div>
    </div>

    <!-- Center start -->
    <div class="overlay-center" id="start-area">
      <div class="start-title">GEMINI CHAT</div>
      <div class="start-subtitle">Voice + Vision</div>
      <button id="start-btn" class="chat-btn">CONNECT</button>
      <div class="start-hint">Camera + microphone required</div>
    </div>

    <!-- Bottom transcript -->
    <div class="overlay-bottom" id="transcript-area">
      <div class="transcript-bar" id="transcript-bar">
        <div class="transcript-text" id="transcript-text">...</div>
      </div>
    </div>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
