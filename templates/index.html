<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Silas</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Camera layer (always behind everything) -->
  <div id="camera-layer">
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="capture-canvas"></canvas>
  </div>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="start-content">
      <div class="start-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
        </div>
        <div class="start-title">SILAS</div>
        <div class="start-subtitle">PERSONAL ASSISTANT</div>
      </div>

      <button id="start-btn" class="btn-primary">START</button>
      <div class="start-hint" id="start-hint">camera + mic required</div>

      <div class="gesture-guide">
        <div class="gesture-guide-title">GESTURES</div>
        <div class="gesture-list">
          <div class="gesture-item"><span class="gesture-icon">&#9995;</span> <span>Note</span></div>
          <div class="gesture-item"><span class="gesture-icon">&#9996;</span> <span>Email</span></div>
          <div class="gesture-item"><span class="gesture-icon">&#9757;</span> <span>Calendar</span></div>
          <div class="gesture-item"><span class="gesture-icon">&#128075;</span> <span>Meeting</span></div>
          <div class="gesture-item"><span class="gesture-icon">&#128076;</span> <span>Send</span></div>
          <div class="gesture-item"><span class="gesture-icon">&#128077;</span> <span>Confirm</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HUD overlay (shown during session) -->
  <div id="hud">
    <!-- Top bar -->
    <div class="hud-top">
      <div class="hud-top-left">
        <div class="status-pill" id="status-pill">
          <div class="status-dot"></div>
          <span>ACTIVE</span>
        </div>
      </div>
      <div class="hud-top-right">
        <div class="gesture-badge" id="gesture-badge">
          <span class="gesture-badge-icon" id="gesture-badge-icon"></span>
          <span class="gesture-badge-text" id="gesture-badge-text"></span>
        </div>
      </div>
    </div>

    <!-- Action notifications (middle area) -->
    <div class="hud-mid">
      <div id="toast-container"></div>
    </div>

    <!-- Bottom: activity feed + narration -->
    <div class="hud-bottom">
      <div class="activity-feed" id="activity-feed"></div>
      <div class="narration-bar">
        <div class="narration-indicator">
          <div class="mic-indicator" id="mic-dot"></div>
          <span class="narration-label">SILAS</span>
        </div>
        <div class="narration-text" id="narration-text">Listening...</div>
        <div class="voice-status" id="voice-status"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
